# Citations that legitimately cannot be resolved by the title/DOI/arXiv APIs in
# tools/verify_citations.py, with a justification for each. Entries are keyed by
# \bibitem key. Format: `key: reason` (one per line).
#
# Allowlisting asserts the reference is REAL (verified by a human/agent), not
# that it supports its claim. Keep this list short; prefer fixing a parse or
# letting the API resolve a reference over adding an exception.

fixed_point: Internal companion paper in this repository; not published, so no DOI/arXiv record exists.

# Books -- no DOI; title-only search does not reliably resolve monographs.
hawking_ellis: "Hawking & Ellis, The Large Scale Structure of Space-Time (CUP, 1973). Monograph, no DOI."

# Verified-real journal articles whose Crossref match falls below threshold
# (older papers, abbreviated titles, or non-English titles with stripped accents).
smale: "Smale, On the structure of manifolds, Amer. J. Math. 84, 387 (1962). Verified real; Crossref fuzzy match below threshold."
radzikowski: "Radzikowski, Micro-local approach to the Hadamard condition, Commun. Math. Phys. 179, 529 (1996). Verified real; bib title is abbreviated relative to Crossref record."
choquet_bruhat: "Choquet-Bruhat, Acta Math. 88, 141 (1952). Verified real; French title, accents stripped during parsing reduce match score."
schauder: "Schauder, Der Fixpunktsatz in Funktionalraeumen, Studia Math. 2, 171 (1930). Verified real; German title not indexed by Crossref title search."
dewitt: "DeWitt, Quantum theory of gravity. I. The canonical theory, Phys. Rev. 160, 1113 (1967). Verified real; DOI 10.1103/PhysRev.160.1113 confirmed via Crossref/APS; older Phys. Rev. paper scores below the bibliographic-query threshold."
bunch_davies: "Bunch & Davies, Quantum field theory in de Sitter space: Renormalization by point-splitting, Proc. R. Soc. Lond. A 360, 117 (1978). Verified real; DOI 10.1098/rspa.1978.0060 confirmed via Royal Society Publishing; journal-abbreviation mismatch reduces Crossref match score."
donaldson_hcob: "Donaldson, Irrationality and the h-cobordism conjecture, J. Diff. Geom. 26, 141 (1987). Verified real via Project Euclid; math journal, below Crossref bibliographic-query threshold."
markus: "Markus, Line element fields and Lorentz structures on differentiable manifolds, Ann. Math. 62, 411 (1955). Verified real; DOI 10.2307/1970071 confirmed via direct Crossref query; 1955 Annals paper scores below the bibliographic-query threshold despite an exact title match."
