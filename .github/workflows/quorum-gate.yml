name: quorum-gate

# Quorum tier of the merge-gate stack (AUTONOMY.md). The required context
# `quorum-gate` is a COMMIT STATUS posted by this workflow, not the job's own
# check run (the job is deliberately named differently). Two triggers drive
# the same evaluator:
#   - pull_request events seed/refresh the status for the head SHA
#     (pending until a verdict exists — so the context is never "missing");
#   - issue_comment events re-evaluate when the reviewer posts a verdict
#     marker, flipping the status without requiring a push.
# Verdict markers are honored from ANY commenter -- the machine-account-only
# trust check was removed 2026-07-12 (full-autonomy amendment, same date as
# the experimenter's removal; see EXPERIMENT.md log). Accepted risk,
# explicitly: any GitHub account can post an honored verdict on any open
# agent-pr by pasting the marker text with the correct head SHA (both are
# public). This is a deliberate tradeoff, not an oversight -- see the
# EXPERIMENT.md log entry for the reasoning and the mitigation considered
# (GitHub interaction limits) and not applied.
# Statuses are per-SHA, so a push automatically invalidates stale verdicts.
# RESEARCH-CONTENT GUARD: the quorum requirement is keyed on the `agent-pr`
# label, which the worker applies to its own PR. To stop a machine-account PR
# from silently skipping quorum by omitting that label, an unlabeled PR
# authored by AUTONOMY_BOT that touches programs/ or explorations/ FAILS this
# gate (missing-label error) instead of passing as "not an agent PR". The gate
# must not depend on the gated agent labelling itself. dependabot, human, and
# metrics PRs are unaffected (not the machine account, or touch only metrics/).
# NOTE: issue_comment workflows execute from the default branch — this file
# gates nothing until merged to main, and hot-fixes need an experimenter-
# approved merge (see EXPERIMENT.md kill-switch runbook).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  issue_comment:
    types: [created, edited]

permissions:
  statuses: write
  pull-requests: read
  issues: read

jobs:
  evaluate:
    name: quorum-gate-eval
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.issue.pull_request
    steps:
      - name: Evaluate verdict markers and post quorum-gate status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BOT: ${{ vars.AUTONOMY_BOT }}
          PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.issue.number }}
        run: |
          set -euo pipefail
          DATA=$(gh api "repos/$REPO/pulls/$PR")
          STATE=$(echo "$DATA" | jq -r .state)
          [ "$STATE" = "open" ] || { echo "PR #$PR is $STATE; nothing to do."; exit 0; }
          SHA=$(echo "$DATA" | jq -r .head.sha)
          LABELS=$(echo "$DATA" | jq -r '[.labels[].name] | join(",")')

          post() {
            gh api "repos/$REPO/statuses/$SHA" \
              -f context=quorum-gate -f state="$1" -f description="$2" >/dev/null
            echo "quorum-gate on $SHA -> $1 ($2)"
          }

          case ",$LABELS," in
            *,agent-pr,*) : ;;
            *)
              # Unlabeled PR. A machine-account PR that touches research content
              # must carry agent-pr — otherwise quorum is skipped by label
              # omission. Fail it so the missing label is fixable (adding the
              # label re-triggers this gate to the pending verdict path).
              AUTHOR=$(echo "$DATA" | jq -r .user.login)
              if [ "$AUTHOR" = "${BOT:-__unset__}" ]; then
                FILES=$(gh api "repos/$REPO/pulls/$PR/files" --paginate | jq -r '.[].filename')
                if echo "$FILES" | grep -qE '^(programs/|explorations/)'; then
                  post failure "Machine-account PR touches research content but lacks agent-pr; quorum is required. Add the agent-pr label."
                  exit 0
                fi
              fi
              post success "Not an agent PR; quorum not required."
              exit 0 ;;
          esac

          # Markers count from any commenter (see header note -- no author
          # check any more), must be the sole content of a line, and fenced
          # code blocks are stripped first -- so quoting the marker format in
          # prose or in a ```example``` (e.g. a responder comment explaining
          # what the reviewer should post) can't be mistaken for a live
          # verdict.
          COMMENTS=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            | jq -r '.[] | .body | gsub("```[\\s\\S]*?```"; "")')

          VERDICT=$(echo "$COMMENTS" \
            | grep -oE "^[[:space:]]*<!-- quorum:verdict (accept|revise|reject) sha=$SHA -->[[:space:]]*$" \
            | tail -1 | grep -oE 'accept|revise|reject' || true)
          STRESS=$(echo "$COMMENTS" \
            | grep -oE "^[[:space:]]*<!-- quorum:stress-test (pass|fail) sha=$SHA -->[[:space:]]*$" \
            | tail -1 | grep -oE 'pass|fail' || true)

          if [ -z "$VERDICT" ]; then
            post pending "Awaiting reviewer quorum verdict for $SHA."
            exit 0
          fi
          if [ "$VERDICT" != "accept" ]; then
            post failure "Reviewer verdict: $VERDICT."
            exit 0
          fi
          case ",$LABELS," in
            *,promotion-rigorous,*)
              case "$STRESS" in
                pass) post success "Quorum accept + independent stress-test pass." ;;
                fail) post failure "Independent stress test failed." ;;
                *)    post pending "Accept present; awaiting independent stress-test marker (promotion-rigorous)." ;;
              esac ;;
            *) post success "Quorum verdict: accept." ;;
          esac
