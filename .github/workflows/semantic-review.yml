name: semantic-review

# Semantic tier of the verification stack (see docs/agent-workflow.md and
# AUTONOMY.md): an isolated LLM evaluator judges questions that aren't
# mechanically decidable — here, whether load-bearing citations actually
# support the claims they're attached to. Existence is already gated
# deterministically by verify-citations; this is the harder claim-support
# question.
#
# BLOCKING under the autonomous experiment: `claim-support` is a required
# check on main (it was advisory in the human-reviewed era). Always-run
# conversion: required checks must never be skipped by trigger-level paths
# filters, so detection happens in-run and the job no-ops to success when
# nothing semantic-relevant changed.
#
# Uses the claude-tests headless runner (LLM-as-evaluator) from the sibling
# repo. Requires the repo secret CLAUDE_CODE_OAUTH_TOKEN (from
# `claude setup-token`); without it the suite is skipped (neutral pass) so the
# gate cannot deadlock on a missing credential — the gap is visible in the log.

on:
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    name: semantic-changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: filter
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          RANGE="origin/${{ github.base_ref }}...HEAD"
          if git diff --name-only $RANGE | grep -qE '^(programs/.*\.tex|\.claude/tests/)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  claim-support:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo
        if: needs.changes.outputs.relevant == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # needed to diff against the base ref for failure scoping

      - name: Check out claude-tests (LLM-as-evaluator runner)
        if: needs.changes.outputs.relevant == 'true'
        uses: actions/checkout@v7
        with:
          repository: willregelmann/claude-tests
          ref: main # needs the arbitrary-headless-tools change (claude-tests#4)
          path: .claude-tests-runner

      - if: needs.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Claude Code CLI
        if: needs.changes.outputs.relevant == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run semantic claim-support evaluation
        if: needs.changes.outputs.relevant == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN not set — skipping semantic review (neutral pass)."
            exit 0
          fi
          set +e
          python3 .claude-tests-runner/bin/run-tests.py citation-claim-support \
            --junit semantic-results.xml --model sonnet 2>&1 | tee claim-support-output.txt
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then exit 0; fi

          # Regression scoping (2026-06-10 amendment): a failed assertion blocks
          # this PR only if the PR's diff touches a .tex file that cites the
          # failing bibitem key. A failure at cite-sites this PR does not modify
          # is a defect of MAIN, not of this diff — it warns loudly and routes to
          # a main-targeting issue instead of blocking unrelated work. (Observed
          # 2026-06-10: a misattribution on main blocked three unrelated PRs.)
          if [ "${{ github.event_name }}" != "pull_request" ]; then exit "$status"; fi
          failed_keys=$(grep -oP '✗ \K[A-Za-z0-9_]+(?=:)' claim-support-output.txt | sort -u)
          if [ -z "$failed_keys" ]; then
            echo "::error::claim-support failed but no per-assertion failures could be parsed — failing closed."
            exit "$status"
          fi
          git fetch -q origin "${{ github.base_ref }}"
          changed_tex=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep '\.tex$' || true)
          blocking=0
          for k in $failed_keys; do
            scoped=""
            for f in $changed_tex; do
              [ -f "$f" ] && grep -q "$k" "$f" && scoped="$scoped $f"
            done
            if [ -n "$scoped" ]; then
              blocking=1
              echo "::error::claim-support assertion '$k' FAILED and this PR modifies citing file(s):$scoped — blocking."
            else
              echo "::warning::claim-support assertion '$k' fails at cite-sites this PR does not modify — pre-existing defect on the base branch. NOT blocking this PR. File or locate an issue against main for '$k' (METHODOLOGY citation-failure recovery applies if merged content misrepresents its source)."
            fi
          done
          exit "$blocking"

      - name: Upload results
        if: always() && hashFiles('semantic-results.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: semantic-results
          path: semantic-results.xml

      - name: No semantic-relevant changes — pass
        if: needs.changes.outputs.relevant != 'true'
        run: echo "No .tex or semantic-test changes; evaluation not needed."
