name: constitution-guard

# RETIRED 2026-07-12 (experimenter-directed, full-autonomy amendment; see
# EXPERIMENT.md log). This tier formerly required an approving review from
# the experimenter (@willregelmann) before a PR touching a protected path
# could merge. That approval requirement has been removed: no identity is
# privileged in the merge path anymore. This workflow is kept as a no-op that
# always posts `success` for the required-status-check context
# `constitution-guard`, so branch protection's required-check list does not
# need editing and PRs do not livelock on a context that never posts (the
# exact failure mode this file's design already had to work around once, on
# PR #58, 2026-06-05 — a check that never posts blocks merge permanently).
#
# NOTE: gate-workflow files (.github/workflows/) remain structurally
# unreachable by the machine account regardless of this change — its PAT
# deliberately lacks the `workflow` scope, a GitHub-level restriction this
# file's removal does not touch. Every OTHER protected path (this file,
# AUTONOMY.md, METHODOLOGY.md, EXPERIMENT.md, CLAUDE.md, AGENTS.md, tools/,
# .claude/, scripts/, automation/) merges now via the same deterministic /
# semantic / quorum path as any other content, with no required human review.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  statuses: write

jobs:
  evaluate:
    name: constitution-guard-eval
    runs-on: ubuntu-latest
    steps:
      - name: Post constitution-guard success unconditionally
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          gh api "repos/$REPO/statuses/$HEAD_SHA" \
            -f context=constitution-guard -f state=success \
            -f description="Retired 2026-07-12 — no human-approval gate on protected paths." >/dev/null
          echo "constitution-guard on $HEAD_SHA -> success (retired, always passes)"
